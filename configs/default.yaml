# 医学图像分割实验配置

# 数据路径
data:
  busi_root: "./data/Dataset_BUSI"
  busuclm_root: "./data/BUS-UCLM"
  
# 数据划分
split:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  seed: 42

# 预处理
preprocess:
  image_size: 256
  normalize_range: [0, 1]

# 训练参数
training:
  epochs: 200
  batch_size: 4
  learning_rate: 0.0001
  optimizer: "adam"
  patience: 20  # 早停

# 模型
model:
  name: "unet"  # unet / nnunet
  in_channels: 1
  out_channels: 1

# 设备
device:
  gpu_id: 0

# 输出
output:
  save_dir: "./results"
